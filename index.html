<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Γενοκτονία Ποντίων — 19 Μαΐου</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}

.poster {
  width: 720px;
  background: #05080F;
  position: relative;
  overflow: hidden;
  font-family: 'Cinzel', serif;
}

.outer-border {
  position: absolute;
  inset: 14px;
  border: 0.5px solid rgba(200,170,80,0.3);
  pointer-events: none;
  z-index: 10;
}

.corner {
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: rgba(200,170,80,0.6);
  border-style: solid;
  z-index: 11;
}
.c-tl { top: 14px; left: 14px; border-width: 1.5px 0 0 1.5px; }
.c-tr { top: 14px; right: 14px; border-width: 1.5px 1.5px 0 0; }
.c-bl { bottom: 14px; left: 14px; border-width: 0 0 1.5px 1.5px; }
.c-br { bottom: 14px; right: 14px; border-width: 0 1.5px 1.5px 0; }

/* TOP SECTION — flag + header */
.top-section {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 36px 50px 24px;
  border-bottom: 0.5px solid rgba(200,170,80,0.15);
}

.flag-img {
  width: 80px;
  height: 54px;
  object-fit: cover;
  opacity: 0.9;
  flex-shrink: 0;
}

.header-titles {
  flex: 1;
}

.republic-label {
  font-size: 8px;
  letter-spacing: 4px;
  color: rgba(200,170,80,0.45);
  text-transform: uppercase;
  line-height: 1.8;
}

.event-title-gr {
  font-size: 11px;
  letter-spacing: 2.5px;
  color: rgba(200,180,110,0.7);
  text-transform: uppercase;
  margin-top: 4px;
}

.date-badge {
  text-align: right;
  flex-shrink: 0;
}

.date-big {
  font-size: 32px;
  font-weight: 700;
  color: #C8A040;
  letter-spacing: 2px;
  line-height: 1;
}

.date-sub {
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(200,160,60,0.45);
  text-transform: uppercase;
  margin-top: 4px;
  text-align: right;
}

/* HERO IMAGE */
.hero-image-wrap {
  position: relative;
  width: 100%;
  height: 340px;
  overflow: hidden;
}

.hero-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: grayscale(100%) contrast(1.1) brightness(0.75);
  display: block;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(5,8,15,0.2) 0%,
    rgba(5,8,15,0.0) 30%,
    rgba(5,8,15,0.0) 60%,
    rgba(5,8,15,0.85) 100%
  );
}

.hero-caption {
  position: absolute;
  bottom: 20px;
  left: 50px;
  right: 50px;
  text-align: center;
}

.hero-caption-text {
  font-family: 'Crimson Text', serif;
  font-size: 11px;
  font-style: italic;
  color: rgba(200,180,130,0.6);
  letter-spacing: 1.5px;
}

/* MAIN TEXT BLOCK */
.main-block {
  padding: 32px 50px 28px;
  text-align: center;
  border-bottom: 0.5px solid rgba(200,170,80,0.12);
}

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 auto 24px;
  width: 320px;
}

.divider-line {
  flex: 1;
  height: 0.5px;
  background: linear-gradient(to right, transparent, rgba(200,170,80,0.4));
}

.divider-line.rev {
  background: linear-gradient(to left, transparent, rgba(200,170,80,0.4));
}

.divider-diamond {
  width: 5px;
  height: 5px;
  background: rgba(200,170,80,0.5);
  transform: rotate(45deg);
  flex-shrink: 0;
}

.main-title-gr {
  font-size: 26px;
  font-weight: 700;
  color: #D4B870;
  letter-spacing: 2px;
  line-height: 1.35;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.main-title-en {
  font-family: 'Crimson Text', serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(180,150,80,0.5);
  text-transform: uppercase;
  margin-bottom: 28px;
}

.years {
  font-size: 15px;
  letter-spacing: 8px;
  color: rgba(200,170,80,0.35);
  margin-bottom: 24px;
}

.quote-gr {
  font-family: 'Crimson Text', serif;
  font-size: 17px;
  font-style: italic;
  color: #A89060;
  line-height: 1.7;
  margin-bottom: 6px;
}

.quote-en {
  font-family: 'Crimson Text', serif;
  font-size: 12px;
  font-style: italic;
  color: rgba(140,120,70,0.55);
  line-height: 1.7;
}

/* MAP SECTION */
.map-section {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 24px 50px;
  border-bottom: 0.5px solid rgba(200,170,80,0.12);
}

.map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  border: 0.5px solid rgba(200,170,80,0.2);
}

.map-wrap img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  object-position: center;
  display: block;
  opacity: 0.85;
  filter: brightness(0.8) saturate(0.7);
}

.map-label {
  font-size: 8px;
  letter-spacing: 2px;
  color: rgba(200,170,80,0.4);
  text-align: center;
  margin-top: 6px;
  text-transform: uppercase;
}

.stats-block {
  width: 200px;
  flex-shrink: 0;
  text-align: center;
}

.stat-number {
  font-size: 36px;
  font-weight: 700;
  color: rgba(200,160,60,0.7);
  letter-spacing: 2px;
  line-height: 1;
}

.stat-label-gr {
  font-family: 'Crimson Text', serif;
  font-size: 12px;
  color: rgba(180,150,80,0.5);
  letter-spacing: 1px;
  margin-top: 6px;
  line-height: 1.5;
}

.stat-label-en {
  font-family: 'Crimson Text', serif;
  font-size: 10px;
  color: rgba(140,120,60,0.35);
  letter-spacing: 1px;
  margin-top: 3px;
}

/* FOOTER */
.footer {
  padding: 20px 50px 36px;
  text-align: center;
}

.memory-gr {
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(200,170,80,0.35);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.memory-en {
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(160,130,60,0.25);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.footer-rule {
  width: 100%;
  height: 0.5px;
  background: linear-gradient(to right, transparent, rgba(200,170,80,0.2), transparent);
  margin-bottom: 12px;
}

.footer-text {
  font-size: 7px;
  letter-spacing: 2px;
  color: rgba(140,120,60,0.3);
  text-transform: uppercase;
}
</style>
</head>
